; UE4SS self-updater configuration.
; This file is read by dwmapi.dll at game startup. Place it next to UE4SS.dll
; (i.e. in <Game>\Binaries\Win64\ue4ss\). The [state] section is written
; automatically after a successful update - do not edit it by hand.

[updater]
; Master switch. Set to false to disable all update checks (pure proxy behaviour).
enabled            = true

; Which builds to track:
;   stable  -> latest non-prerelease GitHub release
;   nightly -> the rolling "experimental-latest" build
;   pinned  -> a specific tag set in pinned_tag below
channel            = nightly

; Used only when channel = pinned, e.g. v3.0.1
pinned_tag         =

; Source repository (owner/name).
repo               = UE4SS-RE/RE-UE4SS

; Config files are always written when missing (so a clean install is complete).
; These options control whether an EXISTING file is overwritten by the release
; (true discards your local changes). Default false = keep yours once present.
overwrite_settings = false      ; UE4SS-settings.ini
overwrite_mods_txt = false      ; Mods/mods.txt (your enabled-mod 0/1 flags)

; Show the small download/install progress window.
show_progress      = true

; How many times to retry a failed/stalled download (with exponential backoff and
; resume-from-partial). 0 = no retries. Helps on weak or intermittent connections.
download_retries   = 5

; How often to check GitHub for updates:
;   0 -> check on every game launch
;   N -> check at most once every N days (based on [state] last_check)
; A missing UE4SS.dll always triggers a check regardless of this setting.
check_interval_days = 0

; Per-component switches.
;   true  = install this component from the release AND enable the mod:
;           Mods\<Name>\mods.txt line set to 1 and an empty enabled.txt placed in
;           the mod folder.
;   false = keep the installed files but disable the mod: mods.txt line set to 0
;           and enabled.txt removed from the mod folder.
; This is an explicit allow-list: a mod NOT listed here is left completely alone
; (not installed, and its mods.txt line / enabled.txt are not touched).
;   core  -> UE4SS.dll itself (plus shared libs, README/Changelog); not a mod.
; The rest map 1:1 to folders under ue4ss\Mods\.
[modules]
core                   = true
ConsoleEnablerMod      = true   ; enables console (tilde or F10 key) in UE4SS games
BPModLoaderMod         = true   ; BP mods
BPML_GenericFunctions  = true   ; companion for BP mods (BPModLoaderMod ecosystem)
CheatManagerEnablerMod = false
ConsoleCommandsMod     = false
SplitScreenMod         = false
LineTraceMod           = false
Keybinds               = false

; --- written automatically by the updater ---
[state]
installed_tag      =
installed_asset    =
last_check         =
